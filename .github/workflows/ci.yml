name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app_build/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app_build

      - name: Lint
        run: npm run lint
        working-directory: app_build

      - name: Run Tests
        run: npm test
        working-directory: app_build
