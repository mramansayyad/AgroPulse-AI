steps:
  # Build the container image using the Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/$PROJECT_ID/agropulse-ai',
        '--build-arg',
        'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}',
        '--build-arg',
        'VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}',
        '--build-arg',
        'VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}',
        '--build-arg',
        'VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}',
        '--build-arg',
        'VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}',
        '--build-arg',
        'VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}',
        '--build-arg',
        'VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}',
        '--build-arg',
        'VITE_FIREBASE_MEASUREMENT_ID=${_VITE_FIREBASE_MEASUREMENT_ID}',
        '.',
      ]

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/agropulse-ai']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      [
        'run',
        'deploy',
        'agropulse-ai',
        '--image',
        'gcr.io/$PROJECT_ID/agropulse-ai',
        '--region',
        'us-central1',
        '--platform',
        'managed',
        '--allow-unauthenticated',
      ]

images:
  - 'gcr.io/$PROJECT_ID/agropulse-ai'

substitutions:
  _VITE_GEMINI_API_KEY: 'YOUR_GEMINI_API_KEY'
  _VITE_FIREBASE_API_KEY: 'YOUR_FIREBASE_API_KEY'
  _VITE_FIREBASE_AUTH_DOMAIN: 'your-project.firebaseapp.com'
  _VITE_FIREBASE_PROJECT_ID: 'your-project-id'
  _VITE_FIREBASE_STORAGE_BUCKET: 'your-project.firebasestorage.app'
  _VITE_FIREBASE_MESSAGING_SENDER_ID: 'YOUR_SENDER_ID'
  _VITE_FIREBASE_APP_ID: 'YOUR_APP_ID'
  _VITE_FIREBASE_MEASUREMENT_ID: 'YOUR_MEASUREMENT_ID'
